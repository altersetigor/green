name: Keep Slack Active

on:
  schedule:
    # Runs every 10 minutes from Monday to Friday
    - cron: '*/10 * * * 1-5'
  workflow_dispatch: # Allows you to manually trigger it

jobs:
  keep-active:
    runs-on: ubuntu-latest
    steps:
      - name: Set Slack Presence to Active
        run: |
          curl -X POST "https://slack.com/api/users.setPresence" \
               -H "Authorization: Bearer ${{ secrets.SLACK_USER_TOKEN }}" \
               -H "Content-Type: application/json; charset=utf-8" \
               -d '{"presence": "auto"}'
